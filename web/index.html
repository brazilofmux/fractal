<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fractal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    html, body, #map { margin: 0; height: 100%; background: #000; }
    #hud {
      position: absolute; top: 10px; left: 10px; z-index: 1;
      color: #cdd6e4; font: 12px/1.4 ui-monospace, monospace;
      background: rgba(8, 12, 20, 0.7); padding: 6px 10px; border-radius: 6px;
    }
    #lore {
      position: absolute; top: 10px; right: 48px; z-index: 2; width: 340px;
      max-height: calc(100% - 40px); overflow-y: auto; display: none;
      color: #ded7c4; background: rgba(12, 14, 22, 0.92);
      border: 1px solid #2a3040; border-radius: 8px; padding: 14px 16px;
      font: 13px/1.55 Georgia, 'Times New Roman', serif;
    }
    #lore h3 { margin: 0 0 2px; font-size: 16px; color: #f0e9d8; }
    #lore .meta { font: 11px ui-monospace, monospace; color: #8b94a6; margin-bottom: 8px; }
    #lore .meta a { color: #7fb0d8; cursor: pointer; text-decoration: underline dotted; }
    #lore .body { white-space: pre-wrap; }
    #lore .annals {
      margin-top: 10px; padding-top: 8px; border-top: 1px solid #2a3040;
      font: 11px/1.6 ui-monospace, monospace; color: #a9b0bf;
    }
    #lore .annals div { margin-bottom: 2px; }
    #lore .annals div.person { color: #a8c8e8; cursor: pointer; }
    #lore .annals div.person:hover { text-decoration: underline dotted; }
    #lore .quiet { color: #8b94a6; font-style: italic; }
    #lore #lore-close {
      position: absolute; top: 8px; right: 10px; cursor: pointer;
      color: #8b94a6; font: 14px ui-monospace, monospace;
    }
    #lore input, #lore textarea {
      width: 100%; box-sizing: border-box; margin: 4px 0;
      background: #141a26; color: #ded7c4; border: 1px solid #2a3040;
      border-radius: 4px; padding: 6px 8px; font: 13px Georgia, serif;
    }
    #lore textarea { height: 90px; resize: vertical; }
    #lore button {
      background: #2a3550; color: #ded7c4; border: 1px solid #3a4a6a;
      border-radius: 4px; padding: 5px 12px; margin-right: 6px; cursor: pointer;
      font: 12px ui-monospace, monospace;
    }
    #lore .danger { color: #d89090; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="lore">
    <span id="lore-close" title="close">✕</span>
    <h3 id="lore-title"></h3>
    <div class="meta" id="lore-meta"></div>
    <div class="body" id="lore-body"></div>
    <div class="annals" id="lore-annals" style="display:none"></div>
  </div>
  <div id="hud">
    <span id="pos">fractal · shift-click to leave a mark</span>
    <select id="overlay" style="margin-left:10px;background:#141a26;color:#cdd6e4;border:1px solid #333;border-radius:4px">
      <option value="">overlay: none</option>
      <option value="plates">plates</option>
      <option value="temperature">temperature</option>
      <option value="precipitation">precipitation</option>
    </select>
  </div>
  <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        projection: { type: 'globe' },
        glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
        sources: {
          world: {
            type: 'raster',
            tiles: ['/tiles/elevation/{z}/{x}/{y}.png'],
            tileSize: 256,
            maxzoom: 22,
          },
          plates: {
            type: 'raster',
            tiles: ['/tiles/plates/{z}/{x}/{y}.png'],
            tileSize: 256,
            maxzoom: 22,
          },
          temperature: {
            type: 'raster',
            tiles: ['/tiles/temperature/{z}/{x}/{y}.png'],
            tileSize: 256,
            maxzoom: 22,
          },
          precipitation: {
            type: 'raster',
            tiles: ['/tiles/precipitation/{z}/{x}/{y}.png'],
            tileSize: 256,
            maxzoom: 22,
          },
          rivers: {
            type: 'vector',
            // Vector tiles are fetched from a worker, which cannot resolve
            // relative URLs — these must be absolute, unlike the raster ones.
            tiles: [location.origin + '/tiles/rivers/{z}/{x}/{y}.mvt'],
            maxzoom: 16,
          },
          roads: {
            type: 'vector',
            tiles: [location.origin + '/tiles/roads/{z}/{x}/{y}.mvt'],
            maxzoom: 14,
          },
          settlements: {
            type: 'vector',
            tiles: [location.origin + '/tiles/settlements/{z}/{x}/{y}.mvt'],
            maxzoom: 14,
          },
          labels: {
            type: 'vector',
            tiles: [location.origin + '/tiles/labels/{z}/{x}/{y}.mvt'],
            maxzoom: 8,
          },
        },
        layers: [
          { id: 'space', type: 'background', paint: { 'background-color': '#01010a' } },
          { id: 'world', type: 'raster', source: 'world' },
          {
            id: 'rivers', type: 'line', source: 'rivers', 'source-layer': 'rivers',
            layout: { 'line-cap': 'round', 'line-join': 'round' },
            paint: {
              'line-color': '#4a8ac2',
              'line-opacity': 0.9,
              'line-width': ['interpolate', ['linear'], ['zoom'],
                2, ['*', ['get', 'w'], 0.22],
                7, ['*', ['get', 'w'], 0.55],
                12, ['*', ['get', 'w'], 1.4],
                16, ['*', ['get', 'w'], 3.0]],
            },
          },
          {
            id: 'roads', type: 'line', source: 'roads', 'source-layer': 'roads',
            layout: { 'line-cap': 'round', 'line-join': 'round' },
            paint: {
              'line-color': '#a08356',
              'line-opacity': 0.85,
              'line-width': ['interpolate', ['linear'], ['zoom'],
                3, ['-', 2.2, ['*', 0.5, ['get', 'tier']]],
                8, ['-', 3.4, ['*', 0.7, ['get', 'tier']]],
                13, ['-', 7.0, ['*', 1.5, ['get', 'tier']]]],
            },
          },
          {
            id: 'settlement-dots', type: 'circle', source: 'settlements', 'source-layer': 'settlements',
            paint: {
              'circle-radius': ['+', 6.5, ['*', -1.5, ['get', 'rank']]],
              'circle-color': ['case', ['==', ['get', 'port'], 1], '#7fd4d4', '#f0e6d2'],
              'circle-stroke-color': '#141a26',
              'circle-stroke-width': 1.2,
            },
          },
          {
            id: 'river-names', type: 'symbol', source: 'rivers', 'source-layer': 'rivers',
            minzoom: 6, filter: ['has', 'name'],
            layout: {
              'symbol-placement': 'line', 'text-field': ['get', 'name'],
              'text-font': ['Open Sans Semibold'], 'text-size': 10.5,
            },
            paint: { 'text-color': '#8fc3e8', 'text-halo-color': '#0c1018', 'text-halo-width': 1.2 },
          },
          ...[
            { id: 'nature-names-along', placement: 'line-center', geom: 'LineString' },
            { id: 'nature-names-at', placement: 'point', geom: 'Point' },
          ].map((v) => ({
            id: v.id, type: 'symbol', source: 'labels', 'source-layer': 'labels',
            filter: ['==', ['geometry-type'], v.geom],
            layout: {
              'symbol-placement': v.placement,
              'text-field': ['get', 'name'],
              'text-font': ['Open Sans Semibold'],
              'text-size': ['match', ['get', 'kind'],
                'continent', 18, 'ocean', 16, 'sea', 13, 'desert', 12,
                'range', 11.5, 11],
              'text-letter-spacing': ['match', ['get', 'kind'],
                'continent', 0.28, 'ocean', 0.22, 'sea', 0.12, 0.04],
              'text-transform': ['match', ['get', 'kind'],
                'continent', 'uppercase', 'ocean', 'uppercase', 'none'],
              'text-max-width': 7,
            },
            paint: {
              'text-color': ['match', ['get', 'kind'],
                'ocean', '#86b9e0', 'sea', '#86b9e0', 'gulf', '#86b9e0',
                'range', '#cdbb96', 'forest', '#96bd8a', 'desert', '#d6c08d',
                '#d8cfb8'],
              'text-halo-color': '#0c1018', 'text-halo-width': 1.2,
            },
          })),
          {
            id: 'settlement-names', type: 'symbol', source: 'settlements', 'source-layer': 'settlements',
            layout: {
              'text-field': ['get', 'name'],
              'text-font': ['Open Sans Semibold'],
              'text-size': ['+', 16, ['*', -2, ['get', 'rank']]],
              'text-offset': [0, 0.9],
              'text-anchor': 'top',
            },
            paint: {
              'text-color': '#ede6d4',
              'text-halo-color': '#0c1018',
              'text-halo-width': 1.4,
            },
          },
          ...['plates', 'temperature', 'precipitation'].map((id) => ({
            id, type: 'raster', source: id,
            layout: { visibility: 'none' },
            paint: { 'raster-opacity': 0.55 },
          })),
        ],
      },
      center: [0, 15],
      zoom: 1.3,
    });
    map.addControl(new maplibregl.NavigationControl());
    map.on('mousemove', (e) => {
      document.getElementById('pos').textContent =
        `fractal · z${map.getZoom().toFixed(1)} · ${e.lngLat.lat.toFixed(4)}, ${e.lngLat.lng.toFixed(4)}`;
    });
    // --- Lore panel -----------------------------------------------------
    const panel = document.getElementById('lore');
    const el = (id) => document.getElementById(id);
    let loreToken = 0; // invalidates in-flight polls when selection changes

    function showLore(id, title, subtitle) {
      const token = ++loreToken;
      panel.style.display = 'block';
      el('lore-title').textContent = title;
      el('lore-meta').textContent = subtitle || '';
      el('lore-body').innerHTML = '<span class="quiet">The chronicler is consulted…</span>';
      el('lore-annals').style.display = 'none';
      pollLore(id, token, title);
    }

    function renderAnnals(r) {
      const a = el('lore-annals');
      const annals = r.annals || [];
      const people = r.people || [];
      if (!annals.length && !people.length) return;
      a.innerHTML = '';
      for (const p of people) {
        const d = document.createElement('div');
        d.className = 'person';
        d.textContent = p.text;
        d.onclick = () => showLore(p.id, p.text.split(' — ')[0], p.text.split(' — ')[1] || '');
        a.append(d);
      }
      for (const entry of annals) {
        const d = document.createElement('div');
        d.textContent = entry;
        a.append(d);
      }
      a.style.display = 'block';
    }

    async function pollLore(id, token, title, misses = 0) {
      let r;
      try {
        const resp = await fetch(`/lore/${id}`);
        r = resp.ok ? await resp.json() : { status: 'failed', message: `no such entry (${resp.status})` };
      } catch {
        // Transient network errors (e.g. the server restarting) retry
        // rather than freezing the panel on its first failure.
        if (misses < 5) {
          setTimeout(() => pollLore(id, token, title, misses + 1), 2000);
          return;
        }
        r = { status: 'failed', message: 'the server is not answering — is it running?' };
      }
      if (token !== loreToken) return; // user moved on
      renderAnnals(r);
      if (r.status === 'generating') {
        el('lore-body').innerHTML = '<span class="quiet">The chronicler is writing…</span>';
        setTimeout(() => pollLore(id, token, title), 2500);
        return;
      }
      if (r.status === 'ready') {
        el('lore-title').textContent = r.name;
        el('lore-body').textContent = r.body;
        const meta = el('lore-meta');
        meta.textContent = '';
        if (r.realm && r.realm.id) {
          const a = document.createElement('a');
          a.textContent = `chronicle of the ${r.realm.name}`;
          a.onclick = () => showLore(r.realm.id, r.realm.name, '');
          meta.append(a);
        }
        return;
      }
      el('lore-body').innerHTML = `<span class="quiet">${
        r.status === 'disabled' ? r.hint : (r.message || 'the page is missing') + ' — click the settlement to retry'
      }</span>`;
    }

    el('lore-close').onclick = () => { panel.style.display = 'none'; loreToken++; };

    map.on('click', 'settlement-dots', (e) => {
      const f = e.features[0].properties;
      const kind = { 1: 'city', 2: 'town', 3: 'village' }[f.rank] || '?';
      document.getElementById('pos').textContent =
        `${f.name} — ${f.port ? 'port ' : ''}${kind}, pop. ~${f.pop}, realm of ${f.realm}`;
      showLore(`s${f.cell}`, f.name,
        `${f.port ? 'port ' : ''}${kind} · pop. ~${f.pop} · realm of ${f.realm}`);
    });
    map.on('mouseenter', 'settlement-dots', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'settlement-dots', () => { map.getCanvas().style.cursor = ''; });
    for (const layer of ['nature-names-along', 'nature-names-at']) {
      map.on('click', layer, (e) => {
        const f = e.features[0].properties;
        showLore(f.id, f.name, f.kind);
      });
      map.on('mouseenter', layer, () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', layer, () => { map.getCanvas().style.cursor = ''; });
    }

    // --- Player annotations ----------------------------------------------
    let notesData = { type: 'FeatureCollection', features: [] };

    function noteFeature(n) {
      return {
        type: 'Feature', id: n.id,
        geometry: { type: 'Point', coordinates: [n.lng, n.lat] },
        properties: { id: n.id, title: n.title, body: n.body },
      };
    }

    async function loadNotes() {
      try {
        const r = await (await fetch('/notes')).json();
        notesData.features = r.notes.map(noteFeature);
        map.getSource('notes')?.setData(notesData);
      } catch {}
    }

    map.on('load', () => {
      map.addSource('notes', { type: 'geojson', data: notesData });
      map.addLayer({
        id: 'note-marks', type: 'circle', source: 'notes',
        paint: {
          'circle-radius': 5, 'circle-color': '#e8c464',
          'circle-stroke-color': '#141a26', 'circle-stroke-width': 1.5,
        },
      });
      map.addLayer({
        id: 'note-labels', type: 'symbol', source: 'notes', minzoom: 4,
        layout: {
          'text-field': ['get', 'title'], 'text-font': ['Open Sans Semibold'],
          'text-size': 11, 'text-offset': [0, 1], 'text-anchor': 'top',
        },
        paint: { 'text-color': '#e8c464', 'text-halo-color': '#0c1018', 'text-halo-width': 1.4 },
      });
      loadNotes();
    });

    function showNoteForm(lngLat) {
      loreToken++; // cancel any lore polling
      panel.style.display = 'block';
      el('lore-title').textContent = 'Leave a mark';
      el('lore-meta').textContent =
        `${lngLat.lat.toFixed(4)}, ${lngLat.lng.toFixed(4)}`;
      el('lore-annals').style.display = 'none';
      el('lore-body').innerHTML = '';
      const name = document.createElement('input');
      name.placeholder = 'Name this place or moment';
      const body = document.createElement('textarea');
      body.placeholder = 'What happened here? (optional)';
      const save = document.createElement('button');
      save.textContent = 'set the mark';
      const cancel = document.createElement('button');
      cancel.textContent = 'never mind';
      save.onclick = async () => {
        const resp = await fetch('/notes', {
          method: 'POST', headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ lat: lngLat.lat, lng: lngLat.lng, title: name.value, body: body.value }),
        });
        if (!resp.ok) { el('lore-meta').textContent = await resp.text(); return; }
        const n = await resp.json();
        notesData.features.push(noteFeature(n));
        map.getSource('notes').setData(notesData);
        showNote(n);
      };
      cancel.onclick = () => { panel.style.display = 'none'; };
      el('lore-body').append(name, body, save, cancel);
      name.focus();
    }

    function showNote(n) {
      loreToken++;
      panel.style.display = 'block';
      el('lore-title').textContent = n.title;
      el('lore-meta').textContent = 'your mark';
      el('lore-annals').style.display = 'none';
      el('lore-body').textContent = n.body || '';
      const rm = document.createElement('button');
      rm.textContent = 'strike this mark';
      rm.className = 'danger';
      rm.onclick = async () => {
        await fetch(`/notes/${n.id}`, { method: 'DELETE' });
        notesData.features = notesData.features.filter((f) => f.properties.id !== n.id);
        map.getSource('notes').setData(notesData);
        panel.style.display = 'none';
      };
      const spacer = document.createElement('div');
      spacer.style.marginTop = '10px';
      el('lore-body').append(spacer, rm);
    }

    map.on('click', 'note-marks', (e) => {
      e.originalEvent._noteHit = true;
      showNote(e.features[0].properties);
    });
    map.on('mouseenter', 'note-marks', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'note-marks', () => { map.getCanvas().style.cursor = ''; });
    map.on('click', (e) => {
      if (e.originalEvent.shiftKey && !e.originalEvent._noteHit) showNoteForm(e.lngLat);
    });
    document.getElementById('overlay').addEventListener('change', (e) => {
      for (const id of ['plates', 'temperature', 'precipitation']) {
        map.setLayoutProperty(id, 'visibility', id === e.target.value ? 'visible' : 'none');
      }
    });
  </script>
</body>
</html>
