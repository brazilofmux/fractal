<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fractal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    html, body, #map { margin: 0; height: 100%; background: #000; }
    #hud {
      position: absolute; top: 10px; left: 10px; z-index: 1;
      color: #cdd6e4; font: 12px/1.4 ui-monospace, monospace;
      background: rgba(8, 12, 20, 0.7); padding: 6px 10px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="hud">
    <span id="pos">fractal</span>
    <select id="overlay" style="margin-left:10px;background:#141a26;color:#cdd6e4;border:1px solid #333;border-radius:4px">
      <option value="">overlay: none</option>
      <option value="plates">plates</option>
      <option value="temperature">temperature</option>
      <option value="precipitation">precipitation</option>
    </select>
  </div>
  <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        projection: { type: 'globe' },
        glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
        sources: {
          world: {
            type: 'raster',
            tiles: ['/tiles/elevation/{z}/{x}/{y}.png'],
            tileSize: 256,
            maxzoom: 22,
          },
          plates: {
            type: 'raster',
            tiles: ['/tiles/plates/{z}/{x}/{y}.png'],
            tileSize: 256,
            maxzoom: 22,
          },
          temperature: {
            type: 'raster',
            tiles: ['/tiles/temperature/{z}/{x}/{y}.png'],
            tileSize: 256,
            maxzoom: 22,
          },
          precipitation: {
            type: 'raster',
            tiles: ['/tiles/precipitation/{z}/{x}/{y}.png'],
            tileSize: 256,
            maxzoom: 22,
          },
          rivers: {
            type: 'vector',
            // Vector tiles are fetched from a worker, which cannot resolve
            // relative URLs — these must be absolute, unlike the raster ones.
            tiles: [location.origin + '/tiles/rivers/{z}/{x}/{y}.mvt'],
            maxzoom: 16,
          },
          roads: {
            type: 'vector',
            tiles: [location.origin + '/tiles/roads/{z}/{x}/{y}.mvt'],
            maxzoom: 14,
          },
          settlements: {
            type: 'vector',
            tiles: [location.origin + '/tiles/settlements/{z}/{x}/{y}.mvt'],
            maxzoom: 14,
          },
        },
        layers: [
          { id: 'space', type: 'background', paint: { 'background-color': '#01010a' } },
          { id: 'world', type: 'raster', source: 'world' },
          {
            id: 'rivers', type: 'line', source: 'rivers', 'source-layer': 'rivers',
            layout: { 'line-cap': 'round', 'line-join': 'round' },
            paint: {
              'line-color': '#4a8ac2',
              'line-opacity': 0.9,
              'line-width': ['interpolate', ['linear'], ['zoom'],
                2, ['*', ['get', 'w'], 0.22],
                7, ['*', ['get', 'w'], 0.55],
                12, ['*', ['get', 'w'], 1.4],
                16, ['*', ['get', 'w'], 3.0]],
            },
          },
          {
            id: 'roads', type: 'line', source: 'roads', 'source-layer': 'roads',
            layout: { 'line-cap': 'round', 'line-join': 'round' },
            paint: {
              'line-color': '#a08356',
              'line-opacity': 0.85,
              'line-width': ['interpolate', ['linear'], ['zoom'],
                3, ['-', 2.2, ['*', 0.5, ['get', 'tier']]],
                8, ['-', 3.4, ['*', 0.7, ['get', 'tier']]],
                13, ['-', 7.0, ['*', 1.5, ['get', 'tier']]]],
            },
          },
          {
            id: 'settlement-dots', type: 'circle', source: 'settlements', 'source-layer': 'settlements',
            paint: {
              'circle-radius': ['+', 6.5, ['*', -1.5, ['get', 'rank']]],
              'circle-color': ['case', ['==', ['get', 'port'], 1], '#7fd4d4', '#f0e6d2'],
              'circle-stroke-color': '#141a26',
              'circle-stroke-width': 1.2,
            },
          },
          {
            id: 'settlement-names', type: 'symbol', source: 'settlements', 'source-layer': 'settlements',
            layout: {
              'text-field': ['get', 'name'],
              'text-font': ['Open Sans Semibold'],
              'text-size': ['+', 16, ['*', -2, ['get', 'rank']]],
              'text-offset': [0, 0.9],
              'text-anchor': 'top',
            },
            paint: {
              'text-color': '#ede6d4',
              'text-halo-color': '#0c1018',
              'text-halo-width': 1.4,
            },
          },
          ...['plates', 'temperature', 'precipitation'].map((id) => ({
            id, type: 'raster', source: id,
            layout: { visibility: 'none' },
            paint: { 'raster-opacity': 0.55 },
          })),
        ],
      },
      center: [0, 15],
      zoom: 1.3,
    });
    map.addControl(new maplibregl.NavigationControl());
    map.on('mousemove', (e) => {
      document.getElementById('pos').textContent =
        `fractal · z${map.getZoom().toFixed(1)} · ${e.lngLat.lat.toFixed(4)}, ${e.lngLat.lng.toFixed(4)}`;
    });
    map.on('click', 'settlement-dots', (e) => {
      const f = e.features[0].properties;
      const kind = { 1: 'city', 2: 'town', 3: 'village' }[f.rank] || '?';
      document.getElementById('pos').textContent =
        `${f.name} — ${f.port ? 'port ' : ''}${kind}, realm of ${f.realm}`;
    });
    map.on('mouseenter', 'settlement-dots', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'settlement-dots', () => { map.getCanvas().style.cursor = ''; });
    document.getElementById('overlay').addEventListener('change', (e) => {
      for (const id of ['plates', 'temperature', 'precipitation']) {
        map.setLayoutProperty(id, 'visibility', id === e.target.value ? 'visible' : 'none');
      }
    });
  </script>
</body>
</html>
